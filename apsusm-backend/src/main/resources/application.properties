# ===========================
# APSUSM Membership System
# ===========================

server.port=5445
spring.application.name=apsusm-membership

# ===========================
# Database (H2 for dev)
# ===========================
spring.datasource.url=jdbc:h2:file:./data/apsusm_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ===========================
# PostgreSQL (production)
# ===========================
# spring.datasource.url=jdbc:postgresql://localhost:5432/apsusm
# spring.datasource.driverClassName=org.postgresql.Driver
# spring.datasource.username=postgres
# spring.datasource.password=your_password
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===========================
# File Upload
# ===========================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=10MB
app.upload.dir=./uploads
app.cards.dir=./generated-cards

# ===========================
# Paystack Configuration
# ===========================
paystack.secret-key=${PAYSTACK_SECRET_KEY:sk_test_xxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
paystack.public-key=${PAYSTACK_PUBLIC_KEY:pk_test_xxxxxxxxxxxxxxxxxxxxxxxxxxxxx}
paystack.base-url=https://api.paystack.co
paystack.callback-url=http://localhost:5173/payment/verify
paystack.webhook-secret=${PAYSTACK_WEBHOOK_SECRET:}

# ===========================
# Email Configuration
# ===========================
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:your-email@gmail.com}
spring.mail.password=${MAIL_PASSWORD:your-app-password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_FROM:noreply@apsusm.org}

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# ===========================
# Admin Credentials
# ===========================
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:apsusm2024}

# ===========================
# Membership Fee (in smallest currency unit, e.g. kobo)
# ===========================
app.membership.fee=500000
app.membership.currency=MZN
